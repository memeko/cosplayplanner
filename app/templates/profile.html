{% extends "base.html" %}
{% block content %}
<section class="section-head">
  <h1>Профиль участника</h1>
</section>

<section class="box">
  <form method="post" action="/profile" class="grid two-col">
    <label>
      Ник
      <input type="text" name="username" value="{{ user.username }}" required />
    </label>
    <label>
      Ник косплеера
      <input type="text" name="cosplay_nick" value="{{ user.cosplay_nick or '' }}" placeholder="Например, neko_cos" />
    </label>
    <label>
      Email
      <input type="email" name="email" value="{{ user.email }}" required />
    </label>
    <label>
      Основной город
      <input type="text" name="home_city" value="{{ user.home_city or '' }}" placeholder="Например, Москва" />
    </label>
    <label>
      Новый пароль
      <input type="password" name="new_password" placeholder="Оставьте пустым, чтобы не менять" />
    </label>
    <label>
      Повтор нового пароля
      <input type="password" name="new_password_confirm" placeholder="Повторите новый пароль" />
    </label>
    <div class="actions-inline">
      <button type="submit" class="btn btn-accent">Сохранить профиль</button>
    </div>
  </form>
</section>
{% endblock %}
