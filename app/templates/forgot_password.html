{% extends "base.html" %}
{% block content %}
<section class="auth-card">
  <h1>Восстановление пароля</h1>
  <form method="post" action="/forgot-password" class="grid one-col">
    <label>
      Email
      <input type="email" name="email" required />
    </label>
    <button type="submit" class="btn">Отправить ссылку</button>
  </form>
  <p class="muted"><a href="/login">Вернуться ко входу</a></p>
</section>
{% endblock %}
