{% extends "base.html" %}
{% block content %}
<section class="auth-card">
  <h1>Новый пароль</h1>
  {% if token_valid %}
    <form method="post" action="/reset-password" class="grid one-col">
      <input type="hidden" name="token" value="{{ token }}" />
      <label>
        Новый пароль
        <input type="password" name="new_password" minlength="6" required />
      </label>
      <label>
        Повтор нового пароля
        <input type="password" name="new_password_confirm" minlength="6" required />
      </label>
      <button type="submit" class="btn">Сохранить пароль</button>
    </form>
  {% else %}
    <p class="muted">Ссылка недействительна или срок её действия истёк.</p>
    <p class="muted"><a href="/forgot-password">Запросить новую ссылку</a></p>
  {% endif %}
  <p class="muted"><a href="/login">Вернуться ко входу</a></p>
</section>
{% endblock %}
