{% extends "base.html" %}
{% block content %}
{% include "community_tabs.html" %}

<section class="section-head">
  <h1>{{ "Редактирование студии" if editing else "Новая студия" }}</h1>
  <a href="{{ '/community/studios/' ~ studio_id if editing else '/community/studios' }}" class="btn">Назад</a>
</section>

<form method="post" action="{{ '/community/studios/' ~ studio_id ~ '/edit' if editing else '/community/studios/new' }}" class="grid one-col big-form">
  <section class="box">
    <div class="grid two-col">
      <label>
        Название *
        <input type="text" name="name" value="{{ form.name }}" maxlength="255" required />
      </label>
      <label>
        Город *
        <input type="text" name="city" value="{{ form.city }}" maxlength="255" required />
      </label>
      <label>
        Адрес
        <input type="text" name="address" value="{{ form.address }}" maxlength="255" />
      </label>
      <label>
        Контакт
        <input type="text" name="contact" value="{{ form.contact }}" maxlength="255" placeholder="Телеграм, VK, телефон..." />
      </label>
    </div>

    <label>
      Теги
      <div class="chips-wrap top-offset">
        {% for tag in studio_tag_options %}
          <label class="chip-check">
            <input type="checkbox" name="tags" value="{{ tag }}" {% if tag in (form.tags_json or []) %}checked{% endif %} />
            {{ tag }}
          </label>
        {% endfor %}
      </div>
    </label>

    <label>
      Фотографии (URL изображений, по одному на строку)
      <textarea name="gallery_input" id="gallery_input" rows="5" placeholder="https://...">{{ form.gallery_input }}</textarea>
    </label>
    <div class="gallery-upload-row">
      <input type="file" id="gallery_upload_files" accept="image/*" multiple />
      <button type="button" class="btn" id="gallery_upload_btn">Загрузить фото</button>
      <span class="muted" id="gallery_upload_status"></span>
    </div>
    <div class="reference-grid" id="gallery_preview"></div>
  </section>

  <section class="box">
    <div class="row-between">
      <h3>Прайс-лист</h3>
      <button type="button" class="btn" id="add-price-row">Добавить строку</button>
    </div>
    <div class="master-price-rows" id="price_rows_wrap">
      {% if form.price_rows %}
        {% for row in form.price_rows %}
          <div class="master-price-row">
            <input type="hidden" name="price_row_id" value="{{ row.row_id }}" />
            <label>
              Услуга
              <input type="text" name="price_service" value="{{ row.service }}" />
            </label>
            <label>
              Стоимость (руб)
              <input type="number" name="price_cost" step="0.01" min="0" value="{{ row.cost }}" />
            </label>
            <label>
              Комментарий
              <input type="text" name="price_comment" value="{{ row.comment }}" />
            </label>
            <button type="button" class="btn btn-danger remove-price-row">Удалить</button>
          </div>
        {% endfor %}
      {% else %}
        <div class="master-price-row">
          <input type="hidden" name="price_row_id" value="price-0" />
          <label>
            Услуга
            <input type="text" name="price_service" value="" />
          </label>
          <label>
            Стоимость (руб)
            <input type="number" name="price_cost" step="0.01" min="0" value="" />
          </label>
          <label>
            Комментарий
            <input type="text" name="price_comment" value="" />
          </label>
          <button type="button" class="btn btn-danger remove-price-row">Удалить</button>
        </div>
      {% endif %}
    </div>
  </section>

  <div class="actions-inline">
    <button type="submit" class="btn btn-accent">{{ "Сохранить" if editing else "Опубликовать" }}</button>
    <a href="{{ '/community/studios/' ~ studio_id if editing else '/community/studios' }}" class="btn">Отмена</a>
  </div>
</form>

<script>
(function () {
  function parseListEntries(value) {
    if (!value) return [];
    return value
      .split(/\n|,/)
      .map((item) => item.trim())
      .filter(Boolean);
  }

  function createImageTile(url) {
    const link = document.createElement('a');
    link.className = 'reference-tile';
    link.href = url;
    link.target = '_blank';
    link.rel = 'noreferrer';

    const image = document.createElement('img');
    image.src = url;
    image.alt = 'Фото студии';

    link.appendChild(image);
    return link;
  }

  function appendUrlsToTextarea(textarea, urls) {
    if (!textarea || !urls.length) return;
    const existing = textarea.value ? `${textarea.value}\n` : '';
    textarea.value = `${existing}${urls.join('\n')}`.trim();
  }

  async function uploadGalleryImages() {
    const filesInput = document.getElementById('gallery_upload_files');
    const status = document.getElementById('gallery_upload_status');
    const textarea = document.getElementById('gallery_input');
    if (!filesInput || !textarea || !filesInput.files?.length) {
      if (status) status.textContent = 'Выберите изображение.';
      return;
    }

    if (status) status.textContent = 'Загрузка...';
    const uploadedUrls = [];
    for (const file of Array.from(filesInput.files)) {
      const formData = new FormData();
      formData.append('image', file);
      try {
        const response = await fetch('/media/upload-image', {
          method: 'POST',
          body: formData,
          credentials: 'same-origin',
        });
        const payload = await response.json();
        if (!response.ok || !payload?.ok || !payload?.url) {
          throw new Error(payload?.detail || 'Ошибка загрузки');
        }
        uploadedUrls.push(payload.url);
      } catch (error) {
        if (status) status.textContent = `Ошибка: ${error.message || 'не удалось загрузить файл'}`;
        return;
      }
    }

    appendUrlsToTextarea(textarea, uploadedUrls);
    filesInput.value = '';
    updateGalleryPreview();
    if (status) status.textContent = `Загружено: ${uploadedUrls.length}`;
  }

  function updateGalleryPreview() {
    const input = document.getElementById('gallery_input');
    const wrap = document.getElementById('gallery_preview');
    if (!input || !wrap) return;

    wrap.innerHTML = '';
    const urls = Array.from(new Set(parseListEntries(input.value).filter((value) => /^https?:\/\//i.test(value))));
    urls.forEach((url) => wrap.appendChild(createImageTile(url)));
  }

  const galleryInput = document.getElementById('gallery_input');
  if (galleryInput) {
    galleryInput.addEventListener('input', updateGalleryPreview);
    updateGalleryPreview();
  }
  const uploadButton = document.getElementById('gallery_upload_btn');
  if (uploadButton) {
    uploadButton.addEventListener('click', uploadGalleryImages);
  }

  const rowsWrap = document.getElementById('price_rows_wrap');
  const addRowBtn = document.getElementById('add-price-row');

  function bindRemoveButtons() {
    document.querySelectorAll('.remove-price-row').forEach((button) => {
      if (button.dataset.bound === '1') return;
      button.dataset.bound = '1';
      button.addEventListener('click', () => {
        const row = button.closest('.master-price-row');
        if (row) {
          row.remove();
        }
      });
    });
  }

  function buildPriceRow(rowId) {
    const row = document.createElement('div');
    row.className = 'master-price-row';
    row.innerHTML = `
      <input type="hidden" name="price_row_id" value="${rowId}" />
      <label>
        Услуга
        <input type="text" name="price_service" value="" />
      </label>
      <label>
        Стоимость (руб)
        <input type="number" name="price_cost" step="0.01" min="0" value="" />
      </label>
      <label>
        Комментарий
        <input type="text" name="price_comment" value="" />
      </label>
      <button type="button" class="btn btn-danger remove-price-row">Удалить</button>
    `;
    return row;
  }

  if (addRowBtn && rowsWrap) {
    addRowBtn.addEventListener('click', () => {
      const rowId = `price-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
      rowsWrap.appendChild(buildPriceRow(rowId));
      bindRemoveButtons();
    });
  }

  bindRemoveButtons();
})();
</script>
{% endblock %}
